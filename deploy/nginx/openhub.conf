server {
    server_name pararouter.com www.pararouter.com;

    # Frontend (static files from Vite build)
    # API routes (proxied to Node.js Hub)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Gateway API (Rust, port 8000)
    location /v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pararouter.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pararouter.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.pararouter.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = pararouter.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name pararouter.com www.pararouter.com;
    return 404; # managed by Certbot
}
